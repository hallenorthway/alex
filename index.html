<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Alex Suero</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Syne:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #ffffff;
        --line: rgba(17, 17, 17, 0.08);
        --max: min(1680px, 100vw - 2rem);
        --gap: clamp(0.45rem, 1.5vw, 0.75rem);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--fg);
        font-family: "Inter", system-ui, sans-serif;
        font-weight: 400;
        font-size: 1rem;
        line-height: 1.55;
      }

      .page {
        max-width: var(--max);
        margin: 0 auto;
        padding: clamp(1rem, 3vw, 1.75rem) clamp(0.75rem, 2.5vw, 1.25rem)
          clamp(4rem, 12vw, 7rem);
      }

      header {
        text-align: left;
        margin-bottom: 0;
        padding-bottom: clamp(0.6rem, 3vw, 0.7rem);
      }

      h1 {
        margin: 0 0 0.12em;
        font-family: "Syne", system-ui, sans-serif;
        font-weight: 700;
        font-size: clamp(1rem, 2.4vw, 1.175rem);
        letter-spacing: -0.02em;
        line-height: 1.2;
      }

      .subtitle {
        margin: 0 0 0.35em;
        font-size: clamp(0.5625rem, 0.95vw, 0.625rem);
        font-weight: 500;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .lede {
        margin: 0;
        max-width: 32em;
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        font-size: clamp(0.6875rem, 1.05vw, 0.75rem);
        font-weight: 300;
        color: var(--fg);
        letter-spacing: 0.01em;
      }

      .lede a {
        color: inherit;
        text-decoration: none;
      }

      .lede a:hover {
        text-decoration: underline;
        text-underline-offset: 0.2em;
      }

      .gallery {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: var(--gap);
        align-items: start;
      }

      .gallery__col {
        display: flex;
        flex-direction: column;
        gap: var(--gap);
      }

      figure {
        margin: 0;
        position: relative;
        overflow: hidden;
        background: #e8e8e6;
        aspect-ratio: 2 / 3;
        box-shadow: 0 1px 0 var(--line);
      }

      figure.landscape {
        aspect-ratio: 6 / 5;
      }

      figure img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .gallery figure {
        cursor: pointer;
      }

      .lightbox {
        position: fixed;
        inset: 0;
        z-index: 1000;
        display: grid;
        place-items: center;
        padding: clamp(0.75rem, 3vw, 1.5rem);
      }

      .lightbox[hidden] {
        display: none !important;
      }

      .lightbox__backdrop {
        position: absolute;
        inset: 0;
        background: rgba(10, 10, 10, 0.94);
        border: none;
        padding: 0;
        cursor: pointer;
      }

      .lightbox__inner {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
      }

      .lightbox__inner img {
        pointer-events: auto;
        box-sizing: border-box;
        max-width: calc(100vw - clamp(1.75rem, 6vw, 3.5rem));
        max-height: min(
          calc(100svh - clamp(3.25rem, 10vw, 5rem)),
          calc(100vh - clamp(3.25rem, 10vw, 5rem))
        );
        width: auto;
        height: auto;
        object-fit: contain;
      }

      .lightbox__close {
        position: fixed;
        top: clamp(0.5rem, 2vw, 1rem);
        right: clamp(0.5rem, 2vw, 1rem);
        z-index: 2;
        width: 2.25rem;
        height: 2.25rem;
        border: none;
        padding: 0;
        margin: 0;
        background: transparent;
        color: rgba(255, 255, 255, 0.85);
        font-family: inherit;
        font-size: 1.5rem;
        font-weight: 300;
        line-height: 1;
        cursor: pointer;
      }

      .lightbox__close:hover,
      .lightbox__close:focus-visible {
        color: #fff;
      }

      .lightbox__close:focus-visible {
        outline: 1px solid rgba(255, 255, 255, 0.6);
        outline-offset: 4px;
      }

      @media (max-width: 720px) {
        .gallery {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header>
        <h1>ALEX SUERO</h1>
        <p class="lede">
          <a href="mailto:alexsuero@gmail.com">email</a>
        </p>
        <p class="lede">
          <a href="tel:+19086744984">phone</a>
        </p>
        <p class="lede">
          <a href="https://www.instagram.com/alexsuero1/">instagram</a>
        </p>
      </header>

      <div class="gallery" aria-label="Selected work">
        <div class="gallery__col">
          <figure>
            <img
              src="images/01.JPG"
              alt=""
              width="1200"
              height="1600"
              loading="lazy"
            />
          </figure>
          <figure>
            <img
              src="images/04.JPG"
              alt=""
              width="1600"
              height="1200"
              loading="lazy"
            />
          </figure>
          <figure class="landscape">
            <img
              src="images/07.JPG"
              alt=""
              width="1600"
              height="1200"
              loading="lazy"
            />
          </figure>
        </div>
        <div class="gallery__col">
          <figure>
            <img
              src="images/02.JPG"
              alt=""
              width="1600"
              height="1200"
              loading="lazy"
            />
          </figure>
          <figure>
            <img
              src="images/05.JPG"
              alt=""
              width="1200"
              height="1600"
              loading="lazy"
            />
          </figure>
          <figure class="landscape">
            <img
              src="images/08.JPG"
              alt=""
              width="1600"
              height="1200"
              loading="lazy"
            />
          </figure>
        </div>
        <div class="gallery__col">
          <figure>
            <img
              src="images/03.JPG"
              alt=""
              width="1200"
              height="1600"
              loading="lazy"
            />
          </figure>
          <figure>
            <img
              src="images/06.JPG"
              alt=""
              width="1600"
              height="1200"
              loading="lazy"
            />
          </figure>
          <figure class="landscape">
            <img
              src="images/09.JPG"
              alt=""
              width="1600"
              height="1200"
              loading="lazy"
            />
          </figure>
        </div>
      </div>
    </div>

    <div
      id="lightbox"
      class="lightbox"
      role="dialog"
      aria-modal="true"
      aria-label="Full size image"
      hidden
    >
      <button
        type="button"
        class="lightbox__backdrop"
        aria-label="Close preview"
        tabindex="-1"
      ></button>
      <div class="lightbox__inner">
        <img class="lightbox__img" alt="" decoding="async" />
      </div>
      <button type="button" class="lightbox__close" aria-label="Close">
        &times;
      </button>
    </div>

    <script>
      (function () {
        const lightbox = document.getElementById("lightbox");
        const lightboxImg = lightbox.querySelector(".lightbox__img");
        const closeBtn = lightbox.querySelector(".lightbox__close");
        const backdrop = lightbox.querySelector(".lightbox__backdrop");
        const gallery = document.querySelector(".gallery");
        const page = document.querySelector(".page");
        let lastFocus = null;

        gallery.querySelectorAll("figure").forEach(function (fig) {
          fig.tabIndex = 0;
          fig.setAttribute("role", "button");
          fig.setAttribute("aria-label", "View image larger");
        });

        function largestSrcsetUrl(srcsetAttr) {
          if (!srcsetAttr || !srcsetAttr.trim()) return null;
          let bestUrl = null;
          let bestW = -1;
          srcsetAttr.split(",").forEach(function (part) {
            const bits = part.trim().split(/\s+/);
            if (!bits.length) return;
            const url = bits[0];
            const desc = bits[1] || "";
            let w = 0;
            if (desc.endsWith("w")) {
              w = parseInt(desc.slice(0, -1), 10) || 0;
            } else if (desc.endsWith("x")) {
              w = Math.round(1000 * (parseFloat(desc.slice(0, -1)) || 1));
            }
            if (w >= bestW) {
              bestW = w;
              bestUrl = url;
            }
          });
          return bestUrl;
        }

        function lightboxUrlCandidates(fromImg) {
          const out = [];
          const push = function (u) {
            if (u && out.indexOf(u) === -1) out.push(u);
          };

          push(fromImg.getAttribute("data-full"));

          const srcAttr = fromImg.getAttribute("src") || "";
          if (srcAttr.indexOf("/") !== -1) {
            push(srcAttr.replace(/^(.*\/)([^/]+)$/, "$1full/$2"));
          }

          const ss = fromImg.getAttribute("srcset");
          push(largestSrcsetUrl(ss));

          push(srcAttr);
          return out;
        }

        function open(fromImg) {
          lastFocus = document.activeElement;
          lightboxImg.alt = fromImg.alt || "";

          const queue = lightboxUrlCandidates(fromImg).filter(Boolean);
          if (!queue.length) return;

          function clearImgHandlers() {
            lightboxImg.onload = null;
            lightboxImg.onerror = null;
          }

          function tryLoad(i) {
            clearImgHandlers();
            if (i >= queue.length) return;
            lightboxImg.onload = clearImgHandlers;
            lightboxImg.onerror = function () {
              clearImgHandlers();
              tryLoad(i + 1);
            };
            if ("fetchPriority" in lightboxImg) {
              lightboxImg.fetchPriority = "high";
            }
            lightboxImg.src = queue[i];
          }

          lightbox.hidden = false;
          document.body.style.overflow = "hidden";
          if (page) page.setAttribute("inert", "");
          closeBtn.focus();
          tryLoad(0);
        }

        function close() {
          lightbox.hidden = true;
          lightboxImg.onload = null;
          lightboxImg.onerror = null;
          lightboxImg.removeAttribute("src");
          lightboxImg.alt = "";
          document.body.style.overflow = "";
          if (page) page.removeAttribute("inert");
          if (lastFocus && typeof lastFocus.focus === "function") {
            lastFocus.focus();
          }
          lastFocus = null;
        }

        gallery.addEventListener("click", function (e) {
          const fig = e.target.closest("figure");
          if (!fig || !gallery.contains(fig)) return;
          const img = fig.querySelector("img");
          if (img) open(img);
        });

        gallery.addEventListener("keydown", function (e) {
          if (e.key !== "Enter" && e.key !== " ") return;
          const fig = e.target.closest("figure");
          if (!fig || !gallery.contains(fig) || e.target !== fig) return;
          e.preventDefault();
          const img = fig.querySelector("img");
          if (img) open(img);
        });

        closeBtn.addEventListener("click", close);
        backdrop.addEventListener("click", close);

        document.addEventListener("keydown", function (e) {
          if (e.key === "Escape" && !lightbox.hidden) close();
        });
      })();
    </script>
  </body>
</html>
