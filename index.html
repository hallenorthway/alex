<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Portfolio — Photography</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Syne:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f7f7f5;
        --fg: #111111;
        --muted: #5c5c5c;
        --line: rgba(17, 17, 17, 0.08);
        --max: 1120px;
        --gap: clamp(1rem, 3vw, 1.75rem);
        --stagger-mid: clamp(2.5rem, 8vw, 5.5rem);
        --stagger-outer: clamp(5rem, 14vw, 10rem);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--fg);
        font-family: "Inter", system-ui, sans-serif;
        font-weight: 400;
        font-size: 1rem;
        line-height: 1.55;
      }

      .page {
        max-width: var(--max);
        margin: 0 auto;
        padding: clamp(3rem, 10vw, 6rem) clamp(1.25rem, 5vw, 2.5rem)
          clamp(4rem, 12vw, 7rem);
      }

      header {
        text-align: center;
        margin-bottom: clamp(3rem, 9vw, 5.5rem);
        padding-bottom: clamp(2rem, 6vw, 3.25rem);
        border-bottom: 1px solid var(--line);
      }

      h1 {
        margin: 0 0 0.35em;
        font-family: "Syne", system-ui, sans-serif;
        font-weight: 500;
        font-size: clamp(2rem, 5vw, 3rem);
        letter-spacing: -0.03em;
        line-height: 1.1;
      }

      .subtitle {
        margin: 0 0 0.85em;
        font-size: clamp(0.8125rem, 1.5vw, 0.9375rem);
        font-weight: 500;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .lede {
        margin: 0 auto;
        max-width: 32em;
        font-size: clamp(0.9375rem, 1.6vw, 1.0625rem);
        font-weight: 300;
        color: var(--fg);
        letter-spacing: 0.01em;
      }

      .gallery {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: var(--gap);
        align-items: start;
      }

      .gallery__col {
        display: flex;
        flex-direction: column;
        gap: var(--gap);
      }

      .gallery__col:nth-child(2) {
        margin-top: var(--stagger-mid);
      }

      .gallery__col:nth-child(3) {
        margin-top: var(--stagger-outer);
      }

      figure {
        margin: 0;
        position: relative;
        overflow: hidden;
        background: #e8e8e6;
        aspect-ratio: 3 / 4;
        box-shadow: 0 1px 0 var(--line);
      }

      figure.landscape {
        aspect-ratio: 4 / 3;
      }

      figure img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.65s cubic-bezier(0.22, 1, 0.36, 1);
      }

      figure:hover img {
        transform: scale(1.03);
      }

      @media (max-width: 720px) {
        .gallery {
          grid-template-columns: 1fr;
        }

        .gallery__col:nth-child(2),
        .gallery__col:nth-child(3) {
          margin-top: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header>
        <h1>Your Name</h1>
        <p class="subtitle">Photography</p>
        <p class="lede">
          A quiet study of light, form, and the space between moments.
        </p>
      </header>

      <div class="gallery" aria-label="Selected work">
        <div class="gallery__col">
          <figure>
            <img
              src="https://picsum.photos/seed/portfolio-a1/800/1067"
              alt=""
              width="800"
              height="1067"
              loading="lazy"
            />
          </figure>
          <figure class="landscape">
            <img
              src="https://picsum.photos/seed/portfolio-a2/1067/800"
              alt=""
              width="1067"
              height="800"
              loading="lazy"
            />
          </figure>
        </div>
        <div class="gallery__col">
          <figure class="landscape">
            <img
              src="https://picsum.photos/seed/portfolio-b1/1067/800"
              alt=""
              width="1067"
              height="800"
              loading="lazy"
            />
          </figure>
          <figure>
            <img
              src="https://picsum.photos/seed/portfolio-b2/800/1067"
              alt=""
              width="800"
              height="1067"
              loading="lazy"
            />
          </figure>
        </div>
        <div class="gallery__col">
          <figure>
            <img
              src="https://picsum.photos/seed/portfolio-c1/800/1067"
              alt=""
              width="800"
              height="1067"
              loading="lazy"
            />
          </figure>
          <figure class="landscape">
            <img
              src="https://picsum.photos/seed/portfolio-c2/1067/800"
              alt=""
              width="1067"
              height="800"
              loading="lazy"
            />
          </figure>
        </div>
      </div>
    </div>
  </body>
</html>
